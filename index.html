<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>Chill Rental — Motor Rental System</title>
  <!-- Inline SVG favicon (🏍️) — avoids a 404 for /favicon.ico without adding a binary file -->
  <link rel="icon" href="data:image/svg+xml,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'&gt;&lt;text y='.9em' font-size='90'&gt;🏍️&lt;/text&gt;&lt;/svg&gt;" />
  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/layout.css" />
  <link rel="stylesheet" href="styles/auth.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <!-- App shell — hidden until auth resolves (revealed in startApp) to avoid a
       flash of the full page before the login overlay renders -->
  <div id="app" class="app-shell" hidden>
    <!-- Top bar (mobile + desktop) -->
    <header class="topbar" role="banner">
      <button class="icon-btn topbar__menu" id="btn-menu" data-i18n-aria="topbar_menu_aria">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="topbar__brand">
        <div class="brand-mark" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/><path d="M15 6h2l3 6"/><path d="M5.5 17.5L9 8h4l2.5 6"/></svg>
        </div>
        <div class="topbar__title">
          <h1>Chill Rental</h1>
          <span class="topbar__sub" id="topbar-context">Dashboard</span>
        </div>
      </div>
      <div class="topbar__actions">
        <button class="chip chip--success" id="kpi-active" data-i18n-title="topbar_new_rental_title"> <!-- title (rented-motor count) is set via JS -->
          <span class="chip__dot"></span>
          <span id="kpi-active-count">0</span> <span data-i18n="topbar_kpi_active">sedang disewa</span>
        </button>
        <!-- R13: Quick action — New Rental (replaces button in page headers) -->
        <button class="btn btn--sm topbar__quick-rental" id="btn-quick-rental" data-i18n-title="topbar_new_rental_title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span class="topbar__quick-rental-label" data-i18n="topbar_quick_rental">Sewa Baru</span>
        </button>
        <button class="icon-btn" id="btn-theme" data-i18n-aria="topbar_theme_aria">
          <svg id="ico-theme" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </header>

    <!-- Sidebar nav (desktop) / drawer (mobile) -->
    <aside class="sidebar" id="sidebar" aria-label="Navigasi utama">
      <nav class="nav">
        <!-- Grup: Operasional -->
        <div class="nav__group" data-group="ops">
          <button type="button" class="nav__group-header" data-group-toggle="ops" aria-expanded="true">
            <span data-i18n="nav_group_ops">Operasional</span>
            <svg class="nav__group-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="nav__group-items">
            <a href="#dashboard" class="nav__item is-active" data-route="dashboard" data-i18n-title="nav_dashboard">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
              <span data-i18n="nav_dashboard">Beranda</span>
            </a>
            <a href="#rentals" class="nav__item" data-route="rentals" data-i18n-title="nav_rentals">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
              <span data-i18n="nav_rentals">Sewa</span>
            </a>
            <a href="#bookings" class="nav__item" data-route="bookings" data-i18n-title="nav_bookings">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><polyline points="9 16 11 18 15 14"/></svg>
              <span data-i18n="nav_bookings">Booking</span>
              <span id="nav-booking-badge" style="margin-left:auto;background:var(--brand);color:var(--text-on-brand);font-size:11px;font-weight:700;border-radius:999px;padding:1px 7px;display:none">0</span>
            </a>
            <a href="#motors" class="nav__item" data-route="motors" data-i18n-title="nav_motors">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/><path d="M15 6h2l3 6"/><path d="M5.5 17.5L9 8h4l2.5 6"/></svg>
              <span data-i18n="nav_motors">Kendaraan</span>
            </a>
            <a href="#damages" class="nav__item" data-route="damages" data-i18n-title="nav_damages">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
              <span data-i18n="nav_damages">Kerusakan</span>
            </a>
          </div>
        </div>
        <!-- Grup: Manajemen (admin+) -->
        <div class="nav__group" data-group="manage" data-requires="page.owners">
          <button type="button" class="nav__group-header" data-group-toggle="manage" aria-expanded="true">
            <span data-i18n="nav_group_manage">Manajemen</span>
            <svg class="nav__group-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="nav__group-items">
            <a href="#owners" class="nav__item" data-route="owners" data-requires="page.owners" data-i18n-title="nav_owners">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
              <span data-i18n="nav_owners">Pemilik</span>
            </a>
            <a href="#staff" class="nav__item" data-route="staff" data-requires="page.staff" data-i18n-title="nav_staff">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M6 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><circle cx="18" cy="6" r="2"/><circle cx="6" cy="6" r="2"/></svg>
              <span data-i18n="nav_staff">Staf</span>
            </a>
            <a href="#reports" class="nav__item" data-route="reports" data-requires="page.reports" data-i18n-title="nav_reports">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
              <span data-i18n="nav_reports">Laporan</span>
            </a>
            <a href="#audit" class="nav__item" data-route="audit" data-requires="page.audit" data-i18n-title="nav_audit">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><path d="M8 11h6"/><path d="M11 8v6"/></svg>
              <span data-i18n="nav_audit">Riwayat Aktivitas</span>
            </a>
          </div>
        </div>
        <!-- Grup: Sistem (admin+) -->
        <div class="nav__group" data-group="system" data-requires="page.settings">
          <button type="button" class="nav__group-header" data-group-toggle="system" aria-expanded="true">
            <span data-i18n="nav_group_system">Sistem</span>
            <svg class="nav__group-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="nav__group-items">
            <a href="#settings" class="nav__item" data-route="settings" data-requires="page.settings" data-i18n-title="nav_settings">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
              <span data-i18n="nav_settings">Pengaturan</span>
            </a>
          </div>
        </div>
      </nav>
      <div class="sidebar__footer">
        <!-- Fase B.2: account block (identity + switch user + logout) -->
        <div class="account" id="account-block" hidden>
          <div class="account__user">
            <span class="account__avatar" id="account-avatar">?</span>
            <span class="account__meta">
              <span class="account__name" id="account-name"></span>
              <span class="account__role" id="account-role"></span>
            </span>
          </div>
          <div class="account__actions">
            <button class="account__btn" id="btn-set-pin-self">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3"/></svg>
              <span data-i18n="btn_change_pin">Ubah PIN</span>
            </button>
            <button class="account__btn" id="btn-switch-user">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
              <span data-i18n="auth_switch_user">Ganti Pengguna</span>
            </button>
            <button class="account__btn account__btn--danger" id="btn-logout">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              <span data-i18n="auth_logout">Keluar</span>
            </button>
          </div>
        </div>

        <p class="muted-xs js-sync-status" id="sync-status"></p>
        <p class="muted-xs">v1.0 · Modular Build</p>
      </div>
    </aside>
    <div class="scrim" id="scrim" hidden></div>

    <!-- Main content area, routed -->
    <main class="content" id="content" tabindex="-1">
      <!-- Pages are injected by router.js -->
    </main>

    <!-- Bottom tab bar (mobile only) -->
    <nav class="tabbar" aria-label="Navigasi cepat">
      <a href="#dashboard" class="tabbar__item is-active" data-route="dashboard">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
        <span data-i18n="tabbar_beranda">Beranda</span>
      </a>
      <a href="#rentals" class="tabbar__item" data-route="rentals">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <span data-i18n="tabbar_sewa">Sewa</span>
      </a>
      <button class="tabbar__fab" id="btn-new-rental" data-i18n-aria="tabbar_fab_aria">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <a href="#motors" class="tabbar__item" data-route="motors">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/><path d="M15 6h2l3 6"/><path d="M5.5 17.5L9 8h4l2.5 6"/></svg>
        <span data-i18n="tabbar_motor">Kendaraan</span>
      </a>
      <a href="#reports" class="tabbar__item" data-route="reports" data-requires="page.reports">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <span data-i18n="tabbar_laporan">Laporan</span>
      </a>
    </nav>

    <!-- Modal mount + toast mount -->
    <div id="modal-root"></div>
    <div id="toast-root" class="toast-root" aria-live="polite"></div>
  </div>

  <!-- Auth gate mount (Fase B.2) — full-screen login overlay -->
  <!-- Boot splash: visible immediately, replaced by the login gate (or hidden
       by startApp) once boot() resolves the auth state -->
  <div id="auth-root">
    <div class="auth-overlay">
      <div class="auth-card card">
        <div class="auth-brand">
          <div class="brand-mark" aria-hidden="true">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/><path d="M15 6h2l3 6"/><path d="M5.5 17.5L9 8h4l2.5 6"/></svg>
          </div>
          <h1>Chill Rental</h1>
        </div>
        <div class="auth-spinner" role="status" aria-label="Memuat…"></div>
      </div>
    </div>
  </div>

  <!-- Modules (load order matters) -->
  <script type="module" src="modules/app.js"></script>
</body>
</html>
