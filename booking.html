<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>PIPES HOSTEL — Motorbike Booking</title>
  <link rel="icon" href="data:image/svg+xml,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'&gt;&lt;text y='.9em' font-size='90'&gt;🏍️&lt;/text&gt;&lt;/svg&gt;" />
  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    /* Standalone, mobile-first guest page — no app shell. */
    /* base.css locks html/body scroll for the staff app shell; this page scrolls normally. */
    html, body { height: auto; min-height: 100%; overflow-x: hidden; overflow-y: auto; }
    body { background: var(--bg-app); color: var(--text-primary); font-family: var(--font-sans); margin: 0; }
    .bk { max-width: 560px; margin: 0 auto; padding: 20px 16px 48px; min-height: 100vh; box-sizing: border-box; }
    .bk__brand { text-align: center; margin: 8px 0 18px; }
    .bk__brand h1 { font-family: var(--font-display); font-weight: 800; font-size: 22px; margin: 0; letter-spacing: .01em; }
    .bk__brand p { color: var(--text-secondary); font-size: 13px; margin: 4px 0 0; }
    .bk__terms {
      max-height: 46vh; overflow-y: auto; padding: 14px 16px; border: 1px solid var(--border-subtle);
      border-radius: var(--r-md); background: var(--bg-elev); white-space: pre-wrap; line-height: 1.55;
      font-size: 13.5px; -webkit-overflow-scrolling: touch;
    }
    .bk__scrollhint { font-size: 12px; color: var(--text-tertiary); text-align: center; margin: 8px 0 0; }
    /* The consent + continue action — highlighted so the next step is obvious. */
    .bk__agree { margin-top: 14px; padding: 14px; border: 1.5px solid var(--brand); border-radius: var(--r-md); background: var(--brand-soft); }
    .bk__field { margin-bottom: 14px; }
    .bk__price { font-family: var(--font-display); font-weight: 800; font-size: 20px; color: var(--brand-soft-text); }
    .bk__seg { display: flex; gap: 8px; }
    .bk__seg .btn { flex: 1; }
    .bk__code {
      font-family: var(--font-mono); font-size: 38px; font-weight: 700; letter-spacing: .12em;
      text-align: center; padding: 16px; border: 2px dashed var(--brand); border-radius: var(--r-lg);
      background: var(--brand-soft); color: var(--brand-soft-text); margin: 10px 0;
    }
    .bk__center { text-align: center; }
    .bk__row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .seg-opt.is-active { background: var(--brand); color: var(--text-on-brand); border-color: var(--brand); }
    /* layout helpers (booking.html does not load layout.css) */
    .row { display: flex; align-items: center; gap: 8px; }
    .row--between { justify-content: space-between; }
    .muted { color: var(--text-secondary); }
  </style>
</head>
<body>
  <main id="booking-root" class="bk" aria-live="polite"></main>
  <script type="module" src="modules/booking-guest.js"></script>
</body>
</html>
